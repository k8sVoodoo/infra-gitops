name: Build Sample Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/sample-api/**"
      - "apps/sample-web/**"
      - ".github/workflows/build-sample-apps.yaml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_OWNER: k8svoodoo

jobs:
  build-sample-api:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build sample-api
        run: docker build -t ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:latest -t ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:${{ github.sha }} ./apps/sample-api

      - name: Push sample-api
        run: |
          docker push ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:latest
          docker push ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:${{ github.sha }}

  build-sample-web:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build sample-web
        run: docker build -t ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:latest -t ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:${{ github.sha }} ./apps/sample-web

      - name: Push sample-web
        run: |
          docker push ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:latest
          docker push ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:${{ github.sha }}