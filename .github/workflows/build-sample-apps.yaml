name: Build Sample Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/sample-api/**"
      - "apps/sample-web/**"
      - ".github/workflows/build-sample-apps.yaml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: k8svoodoo

jobs:
  build-sample-api:
    runs-on: arc-runner-set
    container:
      image: gcr.io/kaniko-project/executor:debug
    steps:
      - uses: actions/checkout@v4

      - name: Configure GHCR auth
        run: |
          mkdir -p /kaniko/.docker
          cat > /kaniko/.docker/config.json <<EOF
          {
            "auths": {
              "ghcr.io": {
                "username": "${{ github.actor }}",
                "password": "${{ secrets.GITHUB_TOKEN }}"
              }
            }
          }
          EOF

      - name: Build and push sample-api
        run: |
          /kaniko/executor \
            --context "${{ github.workspace }}/apps/sample-api" \
            --dockerfile "${{ github.workspace }}/apps/sample-api/Dockerfile" \
            --destination "ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:latest" \
            --destination "ghcr.io/${{ env.IMAGE_OWNER }}/sample-api:${{ github.sha }}"

  build-sample-web:
    runs-on: arc-runner-set
    container:
      image: gcr.io/kaniko-project/executor:debug
    steps:
      - uses: actions/checkout@v4

      - name: Configure GHCR auth
        run: |
          mkdir -p /kaniko/.docker
          cat > /kaniko/.docker/config.json <<EOF
          {
            "auths": {
              "ghcr.io": {
                "username": "${{ github.actor }}",
                "password": "${{ secrets.GITHUB_TOKEN }}"
              }
            }
          }
          EOF

      - name: Build and push sample-web
        run: |
          /kaniko/executor \
            --context "${{ github.workspace }}/apps/sample-web" \
            --dockerfile "${{ github.workspace }}/apps/sample-web/Dockerfile" \
            --destination "ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:latest" \
            --destination "ghcr.io/${{ env.IMAGE_OWNER }}/sample-web:${{ github.sha }}"