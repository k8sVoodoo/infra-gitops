apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: infra-gitops
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/k8sVoodoo/infra-gitops.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: docker-desktop
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/docker-desktop
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra-gitops