apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure/runners/controller
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: runners
  namespace: flux-system
spec:
  interval: 5m
  path: ./infrastructure/runners/scale-set
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: arc-controller
  sourceRef:
    kind: GitRepository
    name: flux-system