apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-logs
  namespace: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.158.2"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: observability
  values:
    mode: daemonset

    image:
      repository: otel/opentelemetry-collector-contrib

    presets:
      logsCollection:
        enabled: true
        includeCollectorLogs: false

    config:
      receivers:
        filelog:
          include:
            - /var/log/pods/*/*/*.log
          start_at: end
          include_file_path: true
          include_file_name: false
          operators:
            - type: container

      processors:
        batch: {}

      exporters:
        loki:
          endpoint: http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push

      service:
        pipelines:
          logs:
            receivers: [filelog]
            processors: [batch]
            exporters: [loki]