apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: mimir-distributed
      version: ">=5.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    mimir:
      structuredConfig:
        multitenancy_enabled: false
        blocks_storage:
          backend: filesystem
        compactor:
          data_dir: /data
        limits:
          max_global_series_per_user: 0
    alertmanager:
      enabled: false
    ruler:
      enabled: false
    ingester:
      replicas: 1
      zoneAwareReplication:
        enabled: false
    distributor:
      replicas: 1
    querier:
      replicas: 1
    query_frontend:
      replicas: 1
    store_gateway:
      replicas: 1
      zoneAwareReplication:
        enabled: false
    compactor:
      replicas: 1