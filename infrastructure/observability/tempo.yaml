apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: tempo
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability
  values:
    tempo:
      reportingEnabled: false
      receivers:
        otlp:
          protocols:
            grpc:
            http:
      storage:
        trace:
          backend: local