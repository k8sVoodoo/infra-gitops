# infrastructure/runners/scale-set/arc-runner-scale-set.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: runners
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller-charts
        namespace: arc-systems
  values:
    githubConfigUrl: "https://github.com/k8sVoodoo/infra-gitops"
    githubConfigSecret: github-runner-secret

    runnerScaleSetName: arc-runner-set

    minRunners: 1
    maxRunners: 4

    containerMode:
      type: dind

    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]