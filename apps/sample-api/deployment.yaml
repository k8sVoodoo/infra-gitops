apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  namespace: sample-api
  labels:
    app.kubernetes.io/name: sample-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-api
    spec:
      containers:
        - name: sample-api
          image: ghcr.io/k8svoodoo/sample-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: sample-api
            - name: VERSION
              value: v1
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      imagePullSecrets:
        - name: ghcr-pull-secret